<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yazy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container player-page">

        <h2>How many players?</h2>
        <p>Choose the number of players</p>
        <p class="last-p">in the game.</p>

        <div class="player-card-container-row1">
            <div class="card sec-btn 2p">
                <div class = "card-number 2p">2</div>
                <div class = "card-text 2p">PLAYERS</div>
            </div>
            <div class="card sec-btn 3p">
                <div class = "card-number 3p">3</div>
                <div class = "card-text 3p">PLAYERS</div>
            </div>
            <div class="card sec-btn 4p">
                <div class = "card-number 4p">4</div>
                <div class = "card-text 4p">PLAYERS</div>
            </div>
        </div>
        <div class="player-card-container-row2 last-p">
            <div class="card sec-btn 5p">
                <div class = "card-number 5p">5</div>
                <div class = "card-text 5p">PLAYERS</div>
            </div>
            <div class="card sec-btn 6p">
                <div class = "card-number 6p">6</div>
                <div class = "card-text 6p">PLAYERS</div>
            </div>
        </div>

        <p class = "last-p">You can play with upto 6 players.</p>
        <br><br>
        <button class="gold-btn">🎲 CONTINUE</button>

    </div>
    <script src="players.js"></script>
</body>
</html>
