<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yazy</title>
    <link rel="stylesheet" href="../stylesheets/style.css">
</head>
<body>
    <div class="container summary">

        <h2>GAME READY!</h2>
        <p class="last-p">Let's roll!</p>

        <div class="summary-info-row">
            <div class="summary-players-card sec-btn">
                <div class="summary-players-card-text">PLAYERS</div>
                <div class="summary-players-card-number">6</div>
            </div>

            <div class="summary-teams-card sec-btn">

                <div class="summary-teams-card-text">FORMAT</div>
                <div class="summary-teams-card-info">TEAMS OF 3</div>
                <div class="summary-teams-card-num">2 Teams</div>

            </div>

        </div>

        <div class="summary-team-card-containers"></div>
        <br>
        <button class="gold-btn">🎲 PLAY NOW</button>
    </div>

    <script src="../scripts/summary.js"></script>
</body>
</html>
