<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yazy</title>
    <link rel="stylesheet" href="../stylesheets/yazy.css">
</head>
<body>
    
    <div class="topArea">

        <p class="logo yellow">🎲 YAZY</p>
        <p class="rounds">ROUND <span class="yellow" id = "num_rounds">1</span>/12</p>
        <p class="settings">⚙️</p>

    </div>

    <div class="scoreArea">

        <table class="score-table">

            <tr class = "team-names-row">
                
            </tr>
            <tr class="player-names-row">

                <td class="yellow">CATEGORIES</td>

            </tr>

            <tr>
                <td>Ones</td>
            </tr>
            <tr>
                <td>Twos</td>
            </tr>
            <tr>
                <td>Threes</td>
            </tr>
            <tr>
                <td>Fours</td>
            </tr>
            <tr>
                <td>Fives</td>
            </tr>
            <tr>
                <td>Sixes</td>
            </tr>
            <tr>
                <td>AAA</td>
            </tr>
            <tr>
                <td>AAAA</td>
            </tr>
            <tr>
                <td>AAABB</td>
            </tr>
            <tr>
                <td>ABCDE</td>
            </tr>
            <tr>
                <td>Yazy</td>
            </tr>
            <tr>
                <td>Lucky Number : ??</td>
            </tr>

            <tr>
                <td class = "yellow">TOTAL</td>
            </tr>

            <tr>
                <td class = "yellow">TEAM TOTAL</td>
            </tr>



        </table>


    </div>

    <div class="bottomArea">

        <div class="diceArea">

            <div class="dies-container">
                <div class="dice"><img class = "dice-img" id = "dice1" src="../assets/dice/empty_dice.png" alt="DICE"></div>
                <div class="dice"><img class = "dice-img" id = "dice2" src="../assets/dice/empty_dice.png" alt="DICE"></div>
                <div class="dice"><img class = "dice-img" id = "dice3" src="../assets/dice/empty_dice.png" alt="DICE"></div>
                <div class="dice"><img class = "dice-img" id = "dice4" src="../assets/dice/empty_dice.png" alt="DICE"></div>
                <div class="dice"><img class = "dice-img" id = "dice5" src="../assets/dice/empty_dice.png" alt="DICE"></div>
            </div>

            <button id="roll-btn">ROLL DICE</button>

        </div>

        <div class="powerupArea">COMING SOON</div>

    </div>


    <script src="../scripts/yazy_ui.js"></script>
    <script src="../scripts/yazy_functions.js"></script>
</body>
</html>
